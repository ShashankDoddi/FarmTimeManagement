            <div class="table-responsive">

      const PAY_PERIODS = [
        {
          label: "28 Apr – 11 May 2026",
          start: "2026-04-28",
          end: "2026-05-11",
        },
        {
          label: "12 May – 25 May 2026",
          start: "2026-05-12",
          end: "2026-05-25",
        },
      ];

      // ══════════════════════════════════════
      //  HELPERS
      // ══════════════════════════════════════
      function staffById(id) {
        return STAFF.find((s) => s.id === id);
      }
      function initials(name) {
        return name
          .split(" ")
          .map((n) => n[0])
          .join("");
      }

      function calcHrs(ci, co) {
        if (!ci || !co) return 0;
        const [ch, cm] = ci.split(":").map(Number),
          [oh, om] = co.split(":").map(Number);
        return Math.max(0, (oh * 60 + om - (ch * 60 + cm)) / 60);
      }

      function getFilteredRecords() {
        const pp =
          PAY_PERIODS[parseInt(document.getElementById("payPeriod").value)];
        const role = document.getElementById("filterRole").value;
        return RECORDS.filter((r) => {
          const st = staffById(r.staffId);
          return (
            r.date >= pp.start &&
            r.date <= pp.end &&
            (!role || st.role === role)
          );
        });
      }

      function getFilteredStaff() {
        const role = document.getElementById("filterRole").value;
        return STAFF.filter((s) => !role || s.role === role);
      }

      function fmt(n) {
        return n.toFixed(1);
      }
      function fmtMoney(n) {
        return (
          "$" +
          n.toLocaleString("en-AU", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          })
        );
      }

      function statCard(label, value, icon, bg, color) {
        return `<div class="stat-card">
    <div class="icon-box" style="background:${bg};color:${color}"><i class="bi bi-${icon}"></i></div>
    <div><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>
  </div>`;
      }

      // ══════════════════════════════════════
      //  POPULATE PAY PERIOD DROPDOWN
      // ══════════════════════════════════════
      function populatePayPeriods() {
        const sel = document.getElementById("payPeriod");
        sel.innerHTML = PAY_PERIODS.map(
          (p, i) => `<option value="${i}">${p.label}</option>`,
        ).join("");
      }

      // ══════════════════════════════════════
      //  RENDER REPORT
      // ══════════════════════════════════════
      function renderReport() {
        const type = document.getElementById("reportType").value;
        const pp =
          PAY_PERIODS[parseInt(document.getElementById("payPeriod").value)];
        document.getElementById("reportSubtitle").textContent =
          "Period: " + pp.label;

        const titles = {
          hours: "Hours Worked Report",
          attendance: "Attendance Summary",
          exceptions: "Exceptions Summary",
          payroll: "Payroll Summary",
        };
        document.getElementById("reportTitle").textContent = titles[type];

        if (type === "hours") renderHours();
        if (type === "attendance") renderAttendance();
        if (type === "exceptions") renderExceptions();
        if (type === "payroll") renderPayroll();
      }

      // ── Hours Worked ──
      function renderHours() {
        const recs = getFilteredRecords();
        const staff = getFilteredStaff();

        let totalHrs = 0,
          totalOT = 0;
        const rows = staff.map((st) => {
          const myRecs = recs.filter((r) => r.staffId === st.id);
          const hrs = myRecs.reduce(
            (a, r) => a + calcHrs(r.clockIn, r.clockOut),
            0,
          );
          const rostered = myRecs.length * 8;
          const ot = Math.max(0, hrs - 38);
          totalHrs += hrs;
          totalOT += ot;
          return { st, shifts: myRecs.length, rostered, hrs, ot };
        });

        document.getElementById("summaryCards").innerHTML =
          statCard(
            "Total Staff",
            staff.length,
            "people-fill",
            "#e8edc8",
            "#696c2b",
          ) +
          statCard(
            "Total Hours",
            fmt(totalHrs) + "h",
            "clock-fill",
            "#d4edda",
            "#28a745",
          ) +
          statCard(
            "Overtime Hours",
            fmt(totalOT) + "h",
            "alarm-fill",
            "#fff3cd",
            "#856404",
          ) +
          statCard(
            "Avg Hours/Staff",
            staff.length ? fmt(totalHrs / staff.length) + "h" : "0h",
            "graph-up",
            "#d4e6f1",
            "#1a6b9a",
          );

        document.getElementById("reportHead").innerHTML = `<tr>
    <th>Staff</th><th>Role</th><th>Shifts</th>
    <th>Rostered Hrs</th><th>Actual Hrs</th><th>Overtime</th><th>Variance</th>
  </tr>`;

        document.getElementById("reportBody").innerHTML = rows
          .map(({ st, shifts, rostered, hrs, ot }) => {
            const variance = hrs - rostered;
            const varClass = variance >= 0 ? "text-success" : "text-danger";
            return `<tr>
      <td><div class="staff-cell-sm">
        <div class="avatar-sm">${initials(st.name)}</div>
        <div><div class="fw-semibold" style="font-size:.85rem">${st.name}</div>
             <div style="font-size:.72rem;color:#6c757d">${st.staffNo}</div></div>
      </div></td>
      <td><span class="role-pill">${st.role}</span></td>
      <td>${shifts}</td>
      <td>${rostered}h</td>
      <td class="fw-semibold">${fmt(hrs)}h</td>
      <td class="${ot > 0 ? "text-warning fw-semibold" : ""}">${fmt(ot)}h</td>
      <td class="${varClass} fw-semibold">${variance >= 0 ? "+" : ""}${fmt(variance)}h</td>
    </tr>`;
          })
          .join("");
      }

      // ── Attendance ──
      function renderAttendance() {
        const recs = getFilteredRecords();
        const staff = getFilteredStaff();

        let totalOnTime = 0,
          totalLate = 0,
          totalMissing = 0;
        const rows = staff.map((st) => {
          const myRecs = recs.filter((r) => r.staffId === st.id);
          const onTime = myRecs.filter((r) => r.clockIn && !r.exception).length;
          const late = myRecs.filter((r) => r.exception === "Late").length;
          const missing = myRecs.filter((r) => !r.clockIn).length;
          const rate = myRecs.length
            ? Math.round(((myRecs.length - missing) / myRecs.length) * 100)
            : 0;
          totalOnTime += onTime;
          totalLate += late;
          totalMissing += missing;
          return { st, total: myRecs.length, onTime, late, missing, rate };
        });

        document.getElementById("summaryCards").innerHTML =
          statCard(
            "Total Rostered",
            recs.length,
            "calendar-check",
            "#e8edc8",
            "#696c2b",
          ) +
          statCard(
            "On Time",
            totalOnTime,
            "check-circle-fill",
            "#d4edda",
            "#28a745",
          ) +
          statCard("Late", totalLate, "clock-history", "#fff3cd", "#856404") +
          statCard(
            "Missing",
            totalMissing,
            "person-x-fill",
            "#fdecea",
            "#c0392b",
          );

        document.getElementById("reportHead").innerHTML = `<tr>
    <th>Staff</th><th>Role</th><th>Total Shifts</th>
    <th>On Time</th><th>Late</th><th>Missing</th><th>Attendance Rate</th>
  </tr>`;

        document.getElementById("reportBody").innerHTML = rows
          .map(({ st, total, onTime, late, missing, rate }) => {
            const rateClass =
              rate >= 90
                ? "text-success"
                : rate >= 70
                  ? "text-warning"
                  : "text-danger";
            return `<tr>
      <td><div class="staff-cell-sm">
        <div class="avatar-sm">${initials(st.name)}</div>
        <div><div class="fw-semibold" style="font-size:.85rem">${st.name}</div>
             <div style="font-size:.72rem;color:#6c757d">${st.staffNo}</div></div>
      </div></td>
      <td><span class="role-pill">${st.role}</span></td>
      <td>${total}</td>
      <td class="text-success fw-semibold">${onTime}</td>
      <td class="${late > 0 ? "text-warning fw-semibold" : ""}">${late}</td>
      <td class="${missing > 0 ? "text-danger fw-semibold" : ""}">${missing}</td>
      <td><span class="rate-bar-wrap">
        <div class="rate-bar" style="width:${rate}%;background:${rate >= 90 ? "#28a745" : rate >= 70 ? "#ffc107" : "#dc3545"}"></div>
      </span><span class="${rateClass} fw-semibold ms-2">${rate}%</span></td>
    </tr>`;
          })
          .join("");
      }

      // ── Exceptions ──
      function renderExceptions() {
        const recs = getFilteredRecords();
        const staff = getFilteredStaff();

        let totalEx = 0;
        const rows = staff
          .map((st) => {
            const myRecs = recs.filter((r) => r.staffId === st.id);
            const late = myRecs.filter((r) => r.exception === "Late").length;
            const missing = myRecs.filter(
              (r) => r.exception === "Missing",
            ).length;
            const early = myRecs.filter(
              (r) => r.exception === "Early Clock-Out",
            ).length;
            const total = late + missing + early;
            totalEx += total;
            return { st, late, missing, early, total };
          })
          .filter((r) => true);

        document.getElementById("summaryCards").innerHTML =
          statCard(
            "Total Exceptions",
            totalEx,
            "exclamation-triangle-fill",
            "#fdecea",
            "#c0392b",
          ) +
          statCard(
            "Late Clock-Ins",
            rows.reduce((a, r) => a + r.late, 0),
            "clock-history",
            "#fff3cd",
            "#856404",

            "Missing",
            rows.reduce((a, r) => a + r.missing, 0),

          statCard(
            "Early Clock-Outs",
            rows.reduce((a, r) => a + r.early, 0),
            "box-arrow-left",
            "#e8edc8",
            "#696c2b",
          );

        document.getElementById("reportHead").innerHTML = `<tr>
    <th>Staff</th><th>Role</th><th>Late</th><th>Missing</th><th>Early Clock-Out</th><th>Total Exceptions</th>
  </tr>`;

        document.getElementById("reportBody").innerHTML = rows
          .map(
            ({ st, late, missing, early, total }) => `<tr>
    <td><div class="staff-cell-sm">
      <div class="avatar-sm">${initials(st.name)}</div>
      <div><div class="fw-semibold" style="font-size:.85rem">${st.name}</div>
           <div style="font-size:.72rem;color:#6c757d">${st.staffNo}</div></div>
    </div></td>
    <td><span class="role-pill">${st.role}</span></td>
    <td class="${late > 0 ? "text-warning fw-semibold" : ""}">${late}</td>
    <td class="${missing > 0 ? "text-danger fw-semibold" : ""}">${missing}</td>
    <td class="${early > 0 ? "text-warning fw-semibold" : ""}">${early}</td>
    <td><span class="exc-total ${total > 0 ? "exc-has" : ""}">${total}</span></td>
  </tr>`,
          )
          .join("");
      }

      // ── Payroll ──
      function renderPayroll() {
        const recs = getFilteredRecords();
        const staff = getFilteredStaff();

        let grandTotal = 0;
        const rows = staff.map((st) => {
          const myRecs = recs.filter((r) => r.staffId === st.id);
          const hrs = myRecs.reduce(
            (a, r) => a + calcHrs(r.clockIn, r.clockOut),
            0,
          );
          const regHrs = Math.min(hrs, 38);
          const otHrs = Math.max(0, hrs - 38);
          const gross = regHrs * st.payRate + otHrs * st.payRate * 1.5;
          grandTotal += gross;
          return { st, hrs, regHrs, otHrs, gross };
        });

        document.getElementById("summaryCards").innerHTML =
          statCard(
            "Total Staff",
            staff.length,
            "people-fill",
            "#e8edc8",
            "#696c2b",
          ) +
          statCard(
            "Total Hours",
            fmt(rows.reduce((a, r) => a + r.hrs, 0)) + "h",
            "clock-fill",
            "#d4edda",
            "#28a745",
          ) +
          statCard(
            "Overtime Hours",
            fmt(rows.reduce((a, r) => a + r.otHrs, 0)) + "h",
            "alarm",
            "#fff3cd",
            "#856404",
          ) +
          statCard(
            "Gross Payroll",
            fmtMoney(grandTotal),
            "cash-stack",
            "#d4e6f1",
            "#1a6b9a",
          );

        document.getElementById("reportHead").innerHTML = `<tr>
    <th>Staff</th><th>Role</th><th>Pay Rate</th>
    <th>Regular Hrs</th><th>Overtime Hrs</th><th>Total Hrs</th><th>Gross Pay</th>
  </tr>`;

        document.getElementById("reportBody").innerHTML =
          rows
            .map(
              ({ st, hrs, regHrs, otHrs, gross }) => `<tr>
    <td><div class="staff-cell-sm">
      <div class="avatar-sm">${initials(st.name)}</div>
      <div><div class="fw-semibold" style="font-size:.85rem">${st.name}</div>
           <div style="font-size:.72rem;color:#6c757d">${st.staffNo}</div></div>
    </div></td>
    <td><span class="role-pill">${st.role}</span></td>
    <td>${fmtMoney(st.payRate)}/hr</td>
    <td>${fmt(regHrs)}h</td>
    <td class="${otHrs > 0 ? "text-warning fw-semibold" : ""}">${fmt(otHrs)}h</td>
    <td class="fw-semibold">${fmt(hrs)}h</td>
    <td class="fw-semibold text-success">${fmtMoney(gross)}</td>
  </tr>`,
            )
            .join("") +
          `<tr class="total-row">
    <td colspan="5" class="text-end fw-bold">Total Gross Payroll</td>
    <td class="fw-bold">${fmt(rows.reduce((a, r) => a + r.hrs, 0))}h</td>
    <td class="fw-bold text-success">${fmtMoney(grandTotal)}</td>
  </tr>`;
      }

      // ── PRINT ──
      function printReport() {
        window.print();
      }

      // ══════════════════════════════════════
      //  INIT
      // ══════════════════════════════════════
      document.getElementById("topbarDate").textContent =
        new Date().toLocaleDateString("en-AU", {
          weekday: "short",
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
      populatePayPeriods();
      renderReport();
    </script>
  </body>
</html>
